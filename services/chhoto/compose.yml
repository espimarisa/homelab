# Chhoto URL: URL forwarder and shortener.
# https://github.com/sintan1729/chhoto-url

---
services:
  chhoto:
    image: ghcr.io/sintan1729/chhoto-url:7.2-alpine
    container_name: chhoto
    hostname: chhoto
    read_only: true
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      CHHOTO_API_KEY: "${CHHOTO_API_KEY}"
      CHHOTO_DB_URL: "/db/urls.sqlite"
      CHHOTO_PASSWORD: "${CHHOTO_PASSWORD}"
      CHHOTO_SITE_URL: "https://${CHHOTO_URL}"
      CHHOTO_SLUG_STYLE: "Pair"
      CHHOTO_SQLITE_ENSURE_ACID: "True"
      CHHOTO_SQLITE_USE_WAL_MODE: "True"
      TZ: "${TZ}"
    expose:
      - 4567/tcp
    networks:
      - external
    volumes:
      - chhoto:/db:rw
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 128M
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:4567/api/whoami || exit 1"
    security_opt:
      - no-new-privileges:true

networks:
  external:
    external: true
    name: external-network

volumes:
  chhoto:
    external: true
    name: chhoto-volume
