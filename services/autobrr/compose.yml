# Autobrr: Download automation tool and ratio manager.
# https://autobrr.com/introduction

---
services:
  autobrr:
    image: ghcr.io/s0up4200/autobrr-distroless:v1.80
    container_name: autobrr
    read_only: true # Prevent writing directly to the image.
    restart: unless-stopped
    user: "${PUID}:${PGID}" # Run as non-root user.
    environment:
      AUTOBRR__DATABASE_TYPE: "postgres" # Enable PostgreSQL.
      AUTOBRR__POSTGRES_DATABASE: "autobrr" # Use the autobrr database.
      AUTOBRR__POSTGRES_HOST: "arr-db" # Connect to arr-db.
      AUTOBRR__POSTGRES_PASS: "${ARR_DB_PASSWORD}" # PostgreSQL password to use.
      AUTOBRR__POSTGRES_PORT: "5432" # PostgreSQL port to connect to.
      AUTOBRR__POSTGRES_USER: "postgres" # PostgreSQL username to use.
    networks:
      - external
      - gluetun
      - internal
    tmpfs:
      - "/tmp:uid=${PUID},gid=${PGID}" # Required for read_only image.
    volumes:
      - /etc/localtime:/etc/localtime:ro # Sets the timezone.
      - autobrr:/config:rw # Autobrr configuration volume.
    cap_drop:
      - ALL # Drop all unnecessary permissions.
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
      arr-db:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
    security_opt:
      - no-new-privileges:true # Prevent privilege escalation.

networks:
  external:
    external: true
    name: external-network
  gluetun:
    external: true
    name: gluetun-network
  internal:
    external: true
    name: internal-network

volumes:
  autobrr:
    name: autobrr-volume
    external: true
