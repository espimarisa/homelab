# OpenCloud: Self-hosted cloud storage service.
# https://docs.opencloud.eu/docs/admin/configuration

---
services:
  opencloud:
    image: opencloudeu/opencloud-rolling:7.1
    command: ["-c", "opencloud init --insecure true || true; opencloud server"] # Init if needed then run the server.
    container_name: opencloud
    entrypoint: /bin/sh # Use sh as an entrypoint for running the binary.
    hostname: opencloud
    read_only: true # Prevent writing directly to the image.
    restart: unless-stopped
    user: "${PUID}:${PGID}" # Run as non-root user.
    environment:
      FRONTEND_ARCHIVER_MAX_SIZE: "1000000000" # Maximum frontend archive size in bytes.
      IDM_ADMIN_PASSWORD: "${OPENCLOUD_ADMIN_PASSWORD}" # Sets the admin password.
      NOTIFICATIONS_SMTP_ENCRYPTION: "${SMTP_TRANSPORT_ENCRYPTION}" # starttls, ssltls, or none.
      NOTIFICATIONS_SMTP_HOST: "${SMTP_HOST}" # External SMTP server host to connect to.
      NOTIFICATIONS_SMTP_INSECURE: "false" # Do not run in insecure mode.
      NOTIFICATIONS_SMTP_PASSWORD: "${SMTP_PASSWORD}" # External SMTP server password to use.
      NOTIFICATIONS_SMTP_PORT: "${SMTP_PORT}" # External SMTP server port to connect to.
      NOTIFICATIONS_SMTP_SENDER: "OpenCloud <${SMTP_SENDER}>" # SMTP server sender.
      NOTIFICATIONS_SMTP_USERNAME: "${SMTP_USERNAME}" # External SMTP server username.
      OC_INSECURE: "false" # Disable insecure mode. Required if exposing externally.
      OC_LOG_COLOR: "true" # Log in colors.
      OC_LOG_LEVEL: "info" # Log at the info level.
      OC_LOG_PRETTY: "true" # Use pretty logs.
      OC_JWT_SECRET: "${OPENCLOUD_SHARING_JWT}" # $ openssl rand -base64 32
      OC_SHARING_PUBLIC_SHARE_MUST_HAVE_PASSWORD: "false" # Allow passwordless r/o shares.
      OC_SHARING_PUBLIC_WRITEABLE_SHARE_MUST_HAVE_PASSWORD: "true" # Require passwords for r/w shares.
      OC_URL: "https://${OPENCLOUD_URL}" # Sets the URL to use.
      PROXY_TLS: "false" # Do not proxy internal services. Required if using a reverse proxy.
    expose:
      - 9200/tcp # Web interface; reverse proxied at ${OPENCLOUD_URL}.
    networks:
      - external
    tmpfs:
      - "/tmp:uid=${PUID},gid=${PGID}" # Required for read-only image.
    volumes:
      - /etc/localtime:/etc/localtime:ro # Sets the timezone.
      - opencloud-config:/etc/opencloud:rw # OpenCloud configuration volume.
      - opencloud-metadata:/var/lib/opencloud:rw # OpenCloud metadata volume.
      - ${OPENCLOUD_UPLOADS_PATH}:/var/lib/opencloud/storage:rw # OpenCloud uploads mount.
    cap_drop:
      - ALL # Drop all unnecessary privileges.
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 4G
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:9200 || exit 1"
    security_opt:
      - no-new-privileges:true # Prevent privelege escalation.

networks:
  external:
    external: true
    name: external-network

volumes:
  opencloud-config:
    name: opencloud-config-volume
    external: true
  opencloud-metadata:
    name: opencloud-metadata-volume
    external: true
