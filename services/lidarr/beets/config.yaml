# marinet beets config
# this configuration file is to be used with lidarr
# and a custom lidarr connect script (see ./import.sh)
# the script will replace environment variables here with their real values.
# for some reason, beets does not support reading environment variables natively!

---
# Plugins to enable.
# discogs: Discogs API support for releases not on MusicBrainz.
# embedart: Embedded art support.
# fetchart: Fetch remote album art.
# ftintitle: Move featured artists to track titles instead of the artist tag.
# lastgenre: Import genres from Last.fm.
# lyrics: Fetch and embed remote lyrics.
# replaygain: Replay gain analysis for tags.
# scrub: Tag scrubber for removing old/useless tags.
# zero: Further tag scrubbing for tags not supported by scrub.
# NOTE: Not using Chroma as we get decently-organized stuff from Lidarr.
plugins: discogs embedart fetchart ftintitle lastgenre lyrics replaygain scrub zero

# Beets configuration.
library: /config/musiclibrary.blb # Save the beets database to the Lidarr volume.
threaded: yes # Enable multithreading.

# Import configuration.
import:
  copy: no # Don't copy files when complete.
  hardlink: no # Don't create hardlinks when complete.
  incremental: no # Don't run incrementally. Allows re-writes.
  log: /config/beet.log # Save log files inside of the container.
  move: no # Don't move files when complete.
  quiet_fallback: skip # Skip fallbacks when running in quiet mode.
  resume: no # Don't resume upon crashing.
  timid: no # Don't use timid mode, we ball!
  write: yes # Write the changes in place. Lidarr handles all moving.

# Album art configuration.
art_filename: cover # Save album art as cover.jpeg.
embedart:
  auto: yes # Automatically embed album art.
  maxwidth: 1500 # Only embed images up to 1500x1500. Any larger can bloat things.
  remove_art_file: no # Do not remove cover.jpeg when finished.
fetchart:
  auto: yes # Automatically download album art.
  enforce_ratio: yes # Require a 1:1 square for album art.
  minwidth: 500 # Require 500x500 art at the minimum.
  lastfm_key: "${LASTFM_API_KEY}" # Connect script will inject the real token here.
  sources: [itunes, coverart, filesystem] # Sources to use. iTunes > Coverart > FS.

# Discogs configuration.
discogs:
  index_tracks: yes # Index tracks through Discogs.
  user_token: "${DISCOGS_API_KEY}" # Connect script will inject the real token here.

# Adds featured artists to the title instead of the tags.
ftintitle:
  auto: yes # Automatically move feat. to the title.
  drop: no # Do not remove featured artists entirely.
  format: "(feat. {0})" # Meow Meow (feat. Meowing On The Internet)

# Last.fm genre configuration.
lastgenre:
  auto: yes # Automatically fetch the genre from Last.fm.
  canonical: yes # Uses a built-in tree to fix weird capitalization/spelling.
  count: 5 # Grabs the top 5 genres from Last.fm.
  force: yes # Overwrite existing genres.
  keep_existing: no # Do not keep existing genres.
  prefer_specific: yes # Prefer specific genres over generic ones.
  source: album # Use the album as the source for genres.

# Lyrics configuration.
lyrics:
  auto: yes # Automatically download lyrics.
  fallback: "" # Do not include fallback lyrics.
  genius_api_key: "${GENIUS_API_KEY}" # Connect script will inject the real token here.
  sources: [lrclib, genius] # Sources to use.
  synced: yes # Enable synced lyrics.

# Match configuration.
match:
  distance_weights:
    album: 4.0 # Heavily penalize matches where the album name differs (e.g., "A Tribute to...")
    albumtype: 2.0 # Penalize matching to compilations/live albums if a studio album exists
    artist: 4.0 # Heavily penalize matches where the artist name differs (e.g., "Various Artists" or cover bands)
  preferred:
    countries: ["US", "GB", "XW"] # Prefer US, GB, and worldwide releases.
    original_year: yes # Prefer original year matches.

# Metadata configuration.
original_date: yes # Use the original date, not the release date.
per_disc_numbering: yes # Enable per-disc numbering.

# ReplayGain configuration
replaygain:
  auto: yes
  backend: ffmpeg
  overwrite: yes # Overwrite existing tags.

# Scrubbing configuration.
scrub:
  auto: yes # Scrub existing tags.
zero:
  fields: comments encoder images # Scrub old tags.
  update_database: true # Update the database when complete.
