---
# Default container options.
x-defaults: &defaults
  network_mode: service:gluetun
  read_only: true
  restart: unless-stopped
  environment:
    TZ: "${TZ}"
  cap_drop:
    - ALL
  depends_on:
    gluetun:
      condition: service_healthy
      restart: true
  security_opt:
    - no-new-privileges:true

services:
  # qBittorrent: BitTorrent client.
  # https://github.com/qbittorrent/qBittorrent/wiki
  qbittorrent:
    <<: *defaults
    image: ghcr.io/11notes/qbittorrent:5
    container_name: qbittorrent
    volumes:
      - downloads:/downloads:rw
      - downloads-incomplete:/downloads-incomplete:rw
      - downloads-permaseed:/downloads-permaseed:rw
      - qbittorrent-config:/qbittorrent/etc:rw
      - qbittorrent-data:/qbittorrent/var:rw
      - qbittorrent-themes:/qbittorrent/themes:rw
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 4GB

  # qui: Alternative web interface for qBittorrent.
  # qui also can handle cross-seeding.
  # https://github.com/autobrr/qui
  qui:
    <<: *defaults
    image: ghcr.io/autobrr/qui:v1.13
    user: "${PUID}:${PGID}"
    container_name: qui
    volumes:
      - qui:/config:rw
      - downloads:/downloads:rw
      - downloads-incomplete:/downloads-incomplete:rw
      - downloads-permaseed:/downloads-permaseed:rw
      - qbittorrent-config:/qbittorrent/etc:rw
      - qbittorrent-data:/qbittorrent/var:rw
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
      qbittorrent:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 512M

volumes:
  qbittorrent-config:
    name: qbittorrent-config-volume
    external: true
  qbittorrent-data:
    name: qbittorrent-data-volume
    external: true
  qbittorrent-themes:
    name: qbittorrent-themes-volume
    external: true
  qui:
    name: qui-volume
    external: true
  downloads:
    name: downloads-bind
    driver_opts:
      device: "${DOWNLOADS_COMPLETE_PATH}"
      o: bind
      type: none
  downloads-incomplete:
    name: downloads-incomplete-bind
    driver_opts:
      device: "${DOWNLOADS_INCOMPLETE_PATH}"
      o: bind
      type: none
  downloads-permaseed:
    name: downloads-permaseed-bind
    driver_opts:
      device: "${DOWNLOADS_PERMASEED_PATH}"
      o: bind
      type: none
