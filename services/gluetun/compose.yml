# Gluetun: VPN client. I'm currently using AirVPN.
# https://github.com/qdm12/gluetun-wiki/tree/main/setup/options

---
services:
  gluetun:
    image: ghcr.io/qdm12/gluetun:v3.41.0
    container_name: gluetun
    hostname: gluetun
    restart: unless-stopped
    devices:
      - /dev/net/tun:/dev/net/tun:rw
    environment:
      BLOCK_MALICIOUS: "off"
      DNS_UPSTREAM_RESOLVERS: "quad9"
      FIREWALL_OUTBOUND_SUBNETS: "${FIREWALL_OUTBOUND_SUBNETS}"
      FIREWALL_VPN_INPUT_PORTS: "${FIREWALL_VPN_INPUT_PORTS}"
      HEALTH_ICMP_TARGET_IPS: "9.9.9.9,149.112.112.112"
      HEALTH_TARGET_ADDRESSES: "www.quad9.net:443"
      PGID: "${PGID}"
      PUID: "${PUID}"
      SERVER_CITIES: "${SERVER_CITIES}"
      SERVER_COUNTRIES: "${SERVER_COUNTRIES}"
      TZ: "${TZ}"
      UPDATER_PERIOD: "24h"
      VPN_SERVICE_PROVIDER: "${VPN_SERVICE_PROVIDER}"
      VPN_TYPE: "wireguard"
      WIREGUARD_ADDRESSES: "${WIREGUARD_ADDRESSES}"
      WIREGUARD_ENDPOINT_PORT: "${WIREGUARD_ENDPOINT_PORT}"
      WIREGUARD_MTU: "${WIREGUARD_MTU:-1380}"
      WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL: "30s"
      WIREGUARD_PRESHARED_KEY: "${WIREGUARD_PRESHARED_KEY}"
      WIREGUARD_PRIVATE_KEY: "${WIREGUARD_PRIVATE_KEY}"
      WIREGUARD_PUBLIC_KEY: "${WIREGUARD_PUBLIC_KEY}"
    expose:
      - 5030/tcp # slskd web interface.
      - 7474/tcp # Autobrr web interface.
      - 7476/tcp # qui web interface.
      - 8080/tcp # qBittorrent web interface.
      - 8191/tcp # Byparr server.
      - 9696/tcp # Prowlarr web interface.
    networks:
      - gluetun
    volumes:
      - gluetun:/gluetun:rw
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - SETFCAP
      - SETPCAP
      - SYS_ADMIN
      - SYS_CHROOT
      - SYS_PTRACE
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
    security_opt:
      - no-new-privileges:true

networks:
  external:
    external: true
    name: external-network
  gluetun:
    external: true
    name: gluetun-network
  internal:
    external: true
    name: internal-network

volumes:
  gluetun:
    name: gluetun-volume
    external: true
