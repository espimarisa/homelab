# Homarr: Dashboard and homepage.
# https://homarr.dev/docs/getting-started/installation/docker

---
services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:v1.63.0
    container_name: homarr
    restart: unless-stopped
    hostname: homarr
    environment:
      DB_DIALECT: "postgresql" # Use PostgreSQL.
      DB_DRIVER: "node-postgres" # Use PostgreSQL database driver.
      DB_URL: "postgres://postgres:${ARR_DB_PASSWORD}@arr-db:5432/homarr-main" # Connect to PostgreSQL at arr-db.
      DOCKER_HOSTNAMES: "socket-proxy" # Connect to the socket-proxy host.
      DOCKER_PORTS: "2375" # Connect to the socket-proxy port.
      PGID: "${PGID}" # Group ID to run as.
      PUID: "${PUID}" # User ID to run as.
      SECRET_ENCRYPTION_KEY: "${HOMARR_ENCRYPTION_KEY}" # Sets the encryption key.
      TZ: "${TZ}" # Sets the timezone.
    expose:
      - 7575/tcp # Homarr web interface reverse proxied at ${HOMARR_URL}.
    networks:
      - external
      - gluetun
      - internal
    volumes:
      - homarr:/appdata:rw # Homarr data storage.
    cap_drop: # Drop all unneccesary privileges.
      - AUDIT_WRITE
      - MKNOD
      - SETFCAP
      - SETPCAP
      - SYS_ADMIN
      - SYS_CHROOT
      - SYS_PTRACE
    depends_on:
      arr-db:
        condition: service_healthy # Require arr-db to be healthy before connecting.
        restart: true # Restart when arr-db restarts.
      socket-proxy:
        condition: service_healthy # Require socket-proxy to be healthy before connecting.
        restart: true # Restart when socket-proxy restarts.
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:7575 || exit 1"
    security_opt:
      - no-new-privileges:true # Prevent privelege escalation.

networks:
  external:
    external: true
    name: external-network
  gluetun:
    external: true
    name: gluetun-network
  internal:
    external: true
    name: internal-network

volumes:
  homarr:
    external: true
    name: homarr-volume
