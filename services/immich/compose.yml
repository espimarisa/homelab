# Immich: Self-hosted photo manager and organizer.
# ML is configured for OpenVINO/Intel ARC in this, you will wanna configure it in the web UI.
# You will also want to tweak the resources as they're pretty high here
# https://immich.app

---
# Default container options.
x-defaults: &defaults
  restart: unless-stopped
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  immich:
    <<: *defaults
    image: ghcr.io/immich-app/immich-server:v2.7.5
    container_name: immich
    user: "${PUID}:${PGID}"
    environment:
      REDIS_PASSWORD: "${IMMICH_REDIS_PASSWORD}" # Redis password to authenticate with.
      DB_URL: "postgresql://postgres:${IMMICH_DB_PASSWORD}@immich-db:5432/immich" # Connect to PostgreSQL.
      REDIS_HOSTNAME: "immich-cache"
      MACHINE_LEARNING_HOST: "immich-ml"
    devices:
      - /dev/dri:/dev/dri:rw # Required for transcoding.
    expose:
      - 2283/tcp # Web interface; externally reverse proxied at ${IMMICH_URL}.
    networks:
      - external
      - internal
    tmpfs:
      - "/run:uid=${PUID},gid=${PGID}" # Required for read-only image.
      - "/tmp:uid=${PUID},gid=${PGID}" # Required for read-only image.
      - "/usr/src/app/.npm:uid=${PUID},gid=${PGID}" # Required for read-only image; installation.
      - "/usr/src/app/.config:uid=${PUID},gid=${PGID}" # Required for read-only image; cache.
    volumes:
      - /etc/localtime:/etc/localtime:ro # Sets the timezone.
      - immich-data:/data:rw # Immich storage mount (user uploads).
    depends_on:
      immich-cache:
        condition: service_healthy
        restart: true
      immich-db:
        condition: service_healthy
        restart: true
      immich-ml:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 4G
    group_add:
      - "${RENDER_PGID}" # Required for video transcoding.

  immich-cache:
    <<: *defaults
    image: ghcr.io/11notes/redis:8
    container_name: immich-cache
    environment:
      REDIS_PASSWORD: "${IMMICH_REDIS_PASSWORD}" # Sets the redis password.
      TZ: "${TZ}"
    networks:
      - internal
    tmpfs:
      - "/tmp:uid=1000,gid=1000" # Required for read-only image.
    volumes:
      - immich-cache-config:/redis/etc:rw # Redis cache config storage.
      - immich-cache-data:/redis/var:rw # Redis cache storage.
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  immich-db:
    <<: *defaults
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3
    container_name: immich-db
    shm_size: 512MB # Increases the shared memory size.
    environment:
      POSTGRES_DB: "immich" # Use the immich database.
      POSTGRES_INITDB_ARGS: "--data-checksums" # Enable checksums.
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD}" # Sets the PostgreSQL password.
      POSTGRES_USER: "postgres"
      TZ: "${TZ}"
    networks:
      - internal
    tmpfs:
      - "/etc/postgresql:exec" # Required for read-only image; psql binary.
      - "/run" # Required for read-only image.
      - "/tmp" # Required for read-only image.
    volumes:
      - immich-db:/var/lib/postgresql:rw # PostgreSQL database storage.
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - SETFCAP
      - SETPCAP
      - SYS_ADMIN
      - SYS_CHROOT
      - SYS_PTRACE
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 2G

  immich-ml:
    <<: *defaults
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5-openvino # Use OpenVino for Intel Arc, see wiki for other stuff.
    container_name: immich-ml
    hostname: immich-ml
    read_only: false
    devices:
      - /dev/dri:/dev/dri:rw # Required for ML.
    environment:
      MACHINE_LEARNING_MAX_BATCH_SIZE__TEXT_RECOGNITION: 1 # Max num of OCR batches.
      MACHINE_LEARNING_MAX_BATCH_SIZE__FACIAL_RECOGNITION: 1 # Max num of faces.
      MACHINE_LEARNING_WORKER_TIMEOUT: 300 # Timeout after 300s.
      MACHINE_LEARNING_WORKERS: 1 # Use 1 worker. Setting any higher uses >=2x resources.
    expose:
      - 3003/tcp # Internal API port for the Immich server.
    networks:
      - internal
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - immich-model-cache:/cache:rw # Persistent storage for downloaded ML models.
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 8G
    group_add:
      - "${RENDER_PGID}" # Required for transcoding and ML.

networks:
  external:
    external: true
    name: external-network
  internal:
    external: true
    name: internal-network

volumes:
  immich-cache-config:
    name: immich-cache-config-volume
    external: true
  immich-cache-data:
    name: immich-cache-data-volume
    external: true
  immich-model-cache:
    name: immich-model-cache-volume
    external: true
  immich-db:
    name: immich-db-volume
    external: true
  immich-data:
    name: immich-data-bind
    driver_opts:
      device: "${IMMICH_UPLOADS_PATH}"
      o: bind
      type: none
