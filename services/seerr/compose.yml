# Seerr: Media request manager and discovery tool.
# https://seerr.dev

---
services:
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.2.0
    container_name: seerr
    hostname: seerr
    read_only: true
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      DB_HOST: "media-db"
      DB_LOG_QUERIES: "false"
      DB_NAME: "seerr-main"
      DB_PASS: "${MEDIA_DB_PASSWORD}"
      DB_PORT: "5432"
      DB_TYPE: "postgres"
      DB_USE_SSL: "false"
      DB_USER: "postgres"
      TZ: "${TZ}"
    expose:
      - 5055/tcp # Seerr web interface, reverse proxied at seerr.${DOMAIN}.
    networks:
      - external
      - gluetun
      - internal
    tmpfs:
      - "/home/node/.local:uid=${PUID},gid=${PGID},exec"
      - "/tmp:uid=${PUID},gid=${PGID}"
    volumes:
      - seerr:/app/config:rw # Seerr configuration and data.
    cap_drop:
      - ALL
    depends_on:
      media-db:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055 || exit 1"
    security_opt:
      - no-new-privileges:true

networks:
  external:
    external: true
    name: external-network
  gluetun:
    external: true
    name: gluetun-network
  internal:
    external: true
    name: internal-network

volumes:
  seerr:
    name: seerr-volume
    external: true
