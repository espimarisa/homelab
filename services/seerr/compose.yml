# Seerr: Media request manager and discovery tool.
# https://seerr.dev

---
services:
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3
    container_name: seerr
    hostname: seerr
    read_only: true # Prevent writing directly to the image.
    restart: unless-stopped
    user: "${PUID}:${PGID}" # Run as non-root user.
    environment:
      DB_HOST: "media-db" # Connect to media-db.
      DB_LOG_QUERIES: "false" # Do not log raw database queries.
      DB_NAME: "seerr" # Use the seerr database.
      DB_PASS: "${MEDIA_DB_PASSWORD}" # PostgreSQL password to use.
      DB_PORT: "5432" # PostgreSQL port to connect to.
      DB_TYPE: "postgres" # Enable PostgreSQL.
      DB_USE_SSL: "false" # Do not use internal SSL.
      DB_USER: "postgres" # PostgreSQL username to use.
      TZ: "${TZ}" # Sets the timezone.
    expose:
      - 5055/tcp # Seerr web interface, reverse proxied at seerr.${DOMAIN}.
    networks:
      - external
      - gluetun
      - internal
    tmpfs:
      - "/home/node/.local:uid=${PUID},gid=${PGID},exec" # Required for deployment in read_only mode.
      - "/tmp:uid=${PUID},gid=${PGID}" # Required for read_only image.
    volumes:
      - seerr:/app/config:rw # Seerr configuration and data.
    cap_drop:
      - ALL # Drop all unnecessary permissions.
    depends_on:
      media-db:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055 || exit 1"
    security_opt:
      - no-new-privileges:true # Prevent privilege escalation.

networks:
  external:
    external: true
    name: external-network
  gluetun:
    external: true
    name: gluetun-network
  internal:
    external: true
    name: internal-network

volumes:
  seerr:
    name: seerr-volume
    external: true
