# Caddy: Reverse proxy and web server.
# Uses a custom image for extended Cloudflare support.
# https://github.com/homeall/caddy-reverse-proxy-cloudflare

---
services:
  caddy:
    image: ghcr.io/homeall/caddy-reverse-proxy-cloudflare:2026.05.26
    container_name: caddy
    env_file: ../../.env # Required for Caddyfile to read environment variables.
    hostname: caddy
    restart: unless-stopped
    environment:
      CADDY_DOCKER_CADDYFILE_PATH: "/etc/caddy/Caddyfile-custom"
      DOCKER_HOST: "tcp://socket-proxy:2375"
      TZ: "${TZ}"
    networks:
      - external
      - gluetun
      - internal
    ports:
      - 80:80/tcp
      - 443:443/tcp
      - 443:443/udp
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile-custom:ro # Custom Caddyfile mount.
      - caddy:/data:rw # Caddy data and certificate storage.
    cap_add:
      - NET_BIND_SERVICE # Required for binding to ports.
    cap_drop:
      - ALL
    depends_on:
      socket-proxy:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 512M
    security_opt:
      - no-new-privileges:true

networks:
  external:
    external: true
    name: external-network
  gluetun:
    external: true
    name: gluetun-network
  internal:
    external: true
    name: internal-network

volumes:
  caddy:
    name: caddy-volume
    external: true
