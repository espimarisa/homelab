# Vaultwarden: Self-hosted Bitwarden-compatible server.
# https://github.com/dani-garcia/vaultwarden/wiki

---
services:
  vaultwarden:
    image: ghcr.io/dani-garcia/vaultwarden:1.36.0-alpine
    container_name: vaultwarden
    hostname: vaultwarden
    read_only: true # Prevent writing directly to the image.
    restart: unless-stopped
    user: "${PUID}:${PGID}" # Run as non-root user.
    environment:
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN} # https://github.com/dani-garcia/vaultwarden/wiki/Enabling-admin-page#using-argon2
      DATABASE_URL: "postgres://postgres:${VAULTWARDEN_DB_PASSWORD}@vaultwarden-db:5432/postgres"
      DOMAIN: "https://${VAULTWARDEN_URL}" # Sets the URL to use.
      EMAIL_2FA_AUTO_FALLBACK: "true" # Use email for 2FA fallback automatically.
      EMAIL_2FA_ENFORCE_ON_VERIFIED_INVITE: "true" # Require email 2FA if no other options are set.
      EMAIL_CHANGE_ALLOWED: "true" # Allow users to change emails.
      EMERGENCY_ACCESS_ALLOWED: "true" # Allow emergency access.
      ENABLE_DB_WAL: "true" # Enable WAL writes for the database.
      EXPERIMENTAL_CLIENT_FEATURE_FLAGS: "ssh-agent-v2,ssh-key-vault-item,pm-25373-windows-biometrics-v2" # https://github.com/dani-garcia/vaultwarden/blob/main/.env.template#L374
      IP_HEADER: "X-Forwarded-For" # Use the X-Forwarded-For header for reverse proxying.
      PUSH_ENABLED: "true" # Enables push notification support. Requires the following two options:
      PUSH_INSTALLATION_ID: "${VAULTWARDEN_PUSH_INSTALLATION_ID}" # https://bitwarden.com/host
      PUSH_INSTALLATION_KEY: "${VAULTWARDEN_PUSH_INSTALLATION_KEY}" # https://bitwarden.com/host
      REQUIRE_DEVICE_EMAIL: "true" # Require new devices to verify by email.
      SENDS_ALLOWED: "true" # Enables the sends feature.
      SIGNUPS_ALLOWED: "${VAULTWARDEN_SIGNUPS}" # Toggles signup support.
      SIGNUPS_VERIFY: "true" # Require new accounts to be verified.
      SMTP_FROM: "${SMTP_SENDER}" # External SMTP server sender URL.
      SMTP_HOST: "${SMTP_HOST}" # External SMTP server host to connect to.
      SMTP_PASSWORD: "${SMTP_PASSWORD}" # External SMTP server password to use.
      SMTP_PORT: "${SMTP_PORT}" # External SMTP server port to connect to.
      SMTP_SECURITY: "${SMTP_SECURITY}" # External SMTP server security method.
      SMTP_USERNAME: "${SMTP_USERNAME}" # External SMTP server username.
      TRASH_AUTO_DELETE_DAYS: "30" # Wait 30 days before deleting items in the trash.
      TZ: "${TZ}"
      YUBICO_CLIENT_ID: "${YUBICO_CLIENT_ID}" # https://upgrade.yubico.com/getapikey/
      YUBICO_SECRET_KEY: "${YUBICO_SECRET_KEY}" # https://upgrade.yubico.com/getapikey/
    expose:
      - 80/tcp # Web interface; reverse proxied at ${VAULTWARDEN_URL}. Admin page is /admin.
    networks:
      - external
      - internal
    tmpfs:
      - "/tmp:uid=${PUID},gid=${PGID}" # Required for read-only image.
    volumes:
      - vaultwarden:/data:rw # Vaultwarden configuration storage.
    cap_drop:
      - ALL # Drop all unnecessary privileges.
    depends_on:
      vaultwarden-db:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/alive || exit 1"
    security_opt:
      - no-new-privileges:true # Prevent privilege escalation.

networks:
  external:
    external: true
    name: external-network
  internal:
    external: true
    name: internal-network

volumes:
  vaultwarden:
    name: vaultwarden-volume
    external: true
