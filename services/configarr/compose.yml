# Configarr: 'ARR profile and custom format synchronization tool.
# Pairs with TRaSH-Guides and other custom formats.
# https://configarr.de/docs/configuration/config-file

---
services:
  configarr:
    image: ghcr.io/11notes/configarr:1
    container_name: configarr
    env_file: ../../.env # Required for config parsing environment variables.
    read_only: true
    restart: unless-stopped
    environment:
      CONFIGARR_SCHEDULE: "0 6 * * *" # Synchronize every day at 6:00 AM.
      TZ: "${TZ}"
    networks:
      - external
      - internal
    tmpfs:
      - "/tmp:uid=1000,gid=1000" # Required for read-only image.
    volumes:
      - ./config:/configarr/etc:rw # Local configuration mount.
      - configarr:/configarr/var:rw # Git clone and cache storage.
    cap_drop:
      - ALL
    depends_on:
      lidarr:
        condition: service_healthy
        restart: true
      radarr:
        condition: service_healthy
        restart: true
      sonarr:
        condition: service_healthy
        restart: true
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
    security_opt:
      - no-new-privileges:true

networks:
  external:
    external: true
    name: external-network
  internal:
    external: true
    name: internal-network

volumes:
  configarr:
    name: configarr-volume
    external: true
